# .github/workflows/bot.yml
name: Binance Chart Bot

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas matplotlib mplfinance requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python charts_gridlines_sessions.py

      - name: Save slot state
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add last_run_slot.txt || true
          git commit -m "update slot state" || true
          git push || true

      - name: Save state files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add last_run_slot.txt heartbeat.txt || true
          git commit -m "update state files" || true
          git push || true
